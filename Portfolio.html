<!DOCTYPE html>

<!-- SIDEBAR -->

<div class="portfolio-wrapper">

    <header>
        <h1 class="portfolio-title">My Portfolio...</h1>
        <p class="portfolio-subtitle">My gallery of creative works</p>
    </header>

    <!-- CHARACTER ART -->
    <section id="char" class="portfolio-section">
        <h2 class="section-title">Character Art</h2>
        <div class="scroll-row">
            <!-- Replace with your real files -->
            <img src="assets/CharacterArt/char1.png" 
            class="has-caption" 
            data-caption="This is a character turnaround for…">
            <img src="assets/CharacterArt/char2.png">
            <video src="assets/CharacterArt/charVid.mp4" controls></video>
        </div>
    </section>

    <!-- GAME PROJECTS -->
    <section id="game" class="portfolio-section">
        <h2 class="section-title">Game Projects</h2>
        <div class="scroll-row">
            <img src="assets/GameArt/game1.png">
            <video src="assets/GameArt/gameVid.mp4" controls></video>
        </div>
    </section>

    <!-- ANIMATION -->
    <section id="anim" class="portfolio-section">
        <h2 class="section-title">Animation</h2>
        <div class="scroll-row">
            <video src="assets/Animation/anim1.mp4" controls></video>
            <video src="assets/Animation/anim2.mp4" controls></video>
        </div>
    </section>

    <!-- 3D MODELS -->
    <section id="models" class="portfolio-section">
        <h2 class="section-title">3D Models</h2>
        <div class="scroll-row">
            <img src="assets/3D/3d1.png">
            <video src="assets/3D/turntable.mp4" controls></video>
        </div>
    </section>

</div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">×</span>

            <img id="modalImage" class="modal-media">
            <video id="modalVideo" class="modal-media" controls></video>

            <p id="modalCaption" class="modal-caption"></p>
        </div>
    </div>

</body>
