<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Design - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>Character Design...</h1>
            <p class="tagline">Original characters, concepts, props, poses & expressions</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- EXAMPLE CARDS (each opens its own slideshow) -->
        <div class="gallery">

            <div class="card" onclick="openGallery('concept', 0)">
                <img src="assets/Concept1.png" alt="">
                <p>Concept Artwork</p>
                <p>£20 - £50</p>
            </div>

            <div class="card" onclick="openGallery('Sheets', 0)">
                <img src="assets/Sheet1.png" alt="">
                <p>Character Sheets</p>
                <p>£50 - £150</p>
            </div>

            <div class="card" onclick="openGallery('Design', 0)">
                <img src="assets/Design1.PNG" alt="">
                <p>Character Design</p>
                <p>£30 - £200</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <!-- BOTH media types (we toggle them) -->
        <img id="overlayImage" class="overlay-image">
        <video id="overlayVideo" class="overlay-image" controls></video>

        <div class="nav-btn left" id="prevImg">⟵</div>
        <div class="nav-btn right" id="nextImg">⟶</div>
    </div>

    <script>
        /* -----------------------------------------
           SEPARATE IMAGE/VIDEO SETS FOR EACH EXAMPLE
        ------------------------------------------ */

        const galleries = {
            concept: [
                "assets/Concept1.png",
                "assets/Concept2.png",
                "assets/Concept3.png",
                "assets/Concept4.png",
                "assets/Concept5.png",
                "assets/Concept6.png",
                "assets/Concept7.png",
                "assets/Concept8.png",
                "assets/Concept9.png",
                "assets/Concept10.PNG",
                "assets/Concept11.PNG",
                "assets/Concept12.PNG",
                "assets/Concept13.PNG",
                "assets/Concept14.png",
                "assets/Concept15.PNG",
                "assets/Concept16.png",
                "assets/Concept17.png",
                "assets/Concept18.PNG",
                "assets/Concept19.PNG",
                "assets/Concept20.png",
                "assets/Concept21.PNG"
            ],
            Sheets: [
                "assets/Sheet1.png",
                "assets/Sheet2.PNG",
                "assets/Sheet3.png",
                "assets/Sheet4.PNG",
                "assets/Sheet5.png",
                "assets/Sheet6.PNG",
                "assets/Sheet7.png",
                "assets/Sheet8.PNG",
                "assets/Sheet9.png",
                "assets/Sheet10.png",
                "assets/Sheet11.png",
                "assets/Sheet12.png",
                "assets/Sheet13.png",
                "assets/Sheet14.png"
            ],
            Design: [
                "assets/Design1.PNG",
                "assets/Design2.png",
                "assets/Design3.png",
                "assets/Design4.png",
                "assets/Design5.PNG",
                "assets/Design6.PNG",
                "assets/Design7.PNG",
                "assets/Design8.PNG",
                "assets/Design9.mp4",
                "assets/Design10.mp4"
            ]
        };

        let currentGallery = [];
        let currentIndex = 0;

        /* -----------------------------------------
           SHOW IMAGE OR VIDEO DEPENDING ON FILE TYPE
        ------------------------------------------ */
        function showMedia(src) {
            const img = document.getElementById("overlayImage");
            const vid = document.getElementById("overlayVideo");

            if (src.endsWith(".mp4")) {
                img.style.display = "none";
                vid.style.display = "block";
                vid.src = src;
                vid.play();
            } else {
                vid.pause();
                vid.style.display = "none";
                img.style.display = "block";
                img.src = src;
            }
        }

        /* --- OPEN SLIDESHOW FOR SPECIFIC EXAMPLE --- */
        function openGallery(type, index) {
            currentGallery = galleries[type];
            currentIndex = index;

            showMedia(currentGallery[currentIndex]);
            document.getElementById("overlay").classList.remove("hidden");
        }

        /* --- CLOSE SLIDESHOW --- */
        document.getElementById("closeOverlay").onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
            document.getElementById("overlayVideo").pause();
        };

        /* --- PREVIOUS IMAGE/VIDEO --- */
        document.getElementById("prevImg").onclick = () => {
            currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };

        /* --- NEXT IMAGE/VIDEO --- */
        document.getElementById("nextImg").onclick = () => {
            currentIndex = (currentIndex + 1) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };
    </script>

</body>
</html>
