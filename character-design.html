<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Design - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>Character Design...</h1>
            <p class="tagline">Original characters, concepts, poses & expressions</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- EXAMPLE CARDS (each opens its own slideshow) -->
        <div class="gallery">

            <div class="card" onclick="openGallery('concept', 0)">
                <img src="assets/character1.jpg" alt="">
                <p>OC Concept</p>
            </div>

            <div class="card" onclick="openGallery('pose', 0)">
                <img src="assets/character2.jpg" alt="">
                <p>Pose Sheet</p>
            </div>

            <div class="card" onclick="openGallery('render', 0)">
                <img src="assets/character3.jpg" alt="">
                <p>Final Render</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <img id="overlayImage" class="overlay-image">

        <div class="nav-btn left" id="prevImg">⟵</div>
        <div class="nav-btn right" id="nextImg">⟶</div>
    </div>

    <script>
        /* -----------------------------------------
           SEPARATE IMAGE SETS FOR EACH EXAMPLE
        ------------------------------------------ */

        const galleries = {
            concept: [
                "assets/StylisedProp1.png",
                "assets/StylisedProp2.png",
                "assets/StylisedProp3.png"
            ],
            pose: [
                "assets/fishGreen1.png",
                "assets/pose2.jpg",
                "assets/pose3.jpg"
            ],
            render: [
                "assets/render1.jpg",
                "assets/render2.jpg",
                "assets/render3.jpg"
            ]
        };

        let currentGallery = [];
        let currentIndex = 0;

        /* --- OPEN SLIDESHOW FOR SPECIFIC EXAMPLE --- */
        function openGallery(type, index) {
            currentGallery = galleries[type];
            currentIndex = index;

            document.getElementById("overlayImage").src = currentGallery[currentIndex];
            document.getElementById("overlay").classList.remove("hidden");
        }

        /* --- CLOSE SLIDESHOW --- */
        document.getElementById("closeOverlay").onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
        };

        /* --- PREVIOUS IMAGE --- */
        document.getElementById("prevImg").onclick = () => {
            currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
            document.getElementById("overlayImage").src = currentGallery[currentIndex];
        };

        /* --- NEXT IMAGE --- */
        document.getElementById("nextImg").onclick = () => {
            currentIndex = (currentIndex + 1) % currentGallery.length;
            document.getElementById("overlayImage").src = currentGallery[currentIndex];
        };
    </script>

</body>
</html>
