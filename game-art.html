<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Art - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>Game Art...</h1>
            <p class="tagline">UI design, icons, assets, textures & more</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- CLICKABLE THUMBNAILS -->
        <div class="gallery">

            <div class="card" onclick="openGallery(0)">
                <img src="assets/ui1.jpg" alt="">
                <p>UI Mockup</p>
            </div>

            <div class="card" onclick="openGallery(1)">
                <img src="assets/icon1.jpg" alt="">
                <p>Item Icons</p>
            </div>

            <div class="card" onclick="openGallery(2)">
                <img src="assets/asset1.jpg" alt="">
                <p>Game Asset</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <img id="overlayImage" class="overlay-image">

        <div class="nav-btn left" id="prevImg">⟵</div>
