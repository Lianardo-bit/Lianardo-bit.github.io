<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Art - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>Game Art...</h1>
            <p class="tagline">UI design, icons, assets & more</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- EXAMPLE CARDS (each opens its own slideshow) -->
        <div class="gallery">

            <div class="card" onclick="openGallery('ui', 0)">
                <img src="assets/UI1.png" alt="">
                <p>UI Designs</p>
                <p>£50 - £100</p>
            </div>

            <div class="card" onclick="openGallery('promotionalart', 0)">
                <img src="assets/PromotionalArt1.png" alt="">
                <p>Promotional Art</p>
                <p>£30 - £50</p>
            </div>

            <div class="card" onclick="openGallery('Logo', 0)">
                <img src="assets/Logo1.png" alt="">
                <p>Logo Designs</p>
                <p>£20 - £50</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <!-- BOTH media types (we toggle them) -->
        <img id="overlayImage" class="overlay-image">
        <video id="overlayVideo" class="overlay-image" controls></video>

        <div class="nav-btn left" id="prevImg">⟵</div>
        <div class="nav-btn right" id="nextImg">⟶</div>
    </div>

    <script>
        /* -----------------------------------------
           SEPARATE IMAGE/VIDEO SETS FOR EACH EXAMPLE
        ------------------------------------------ */

        const galleries = {
            ui: [
                "assets/UI1.png",
                "assets/UI2.png",
                "assets/UI3.PNG",
                "assets/UI4.png",
                "assets/UI5.png",
                "assets/UI6.png",
                "assets/UI7.png",
                "assets/UI8.PNG",
                "assets/UI9.png"
            ],
            promotionalart: [
                "assets/PromotionalArt1.PNG",
                "assets/PromotionalArt2.PNG",
                "assets/PromotionalArt3.png",
                "assets/PromotionalArt4.PNG",
                "assets/PromotionalArt5.PNG",
                "assets/PromotionalArt6.PNG",
                "assets/PromotionalArt7.PNG"
            ],
            Logo: [
                "assets/Logo1.png",
                "assets/Logo2.PNG",
                "assets/Logo3.png",
                "assets/Logo4.png",
                "assets/Logo5.PNG",
                "assets/Logo6.PNG",
                "assets/Logo7.PNG",
                "assets/Logo8.PNG"
            ]
        };

        let currentGallery = [];
        let currentIndex = 0;

        /* -----------------------------------------
           SHOW IMAGE OR VIDEO DEPENDING ON FILE TYPE
        ------------------------------------------ */
        function showMedia(src) {
            const img = document.getElementById("overlayImage");
            const vid = document.getElementById("overlayVideo");

            if (src.endsWith(".mp4")) {
                img.style.display = "none";
                vid.style.display = "block";
                vid.src = src;
                vid.play();
            } else {
                vid.pause();
                vid.style.display = "none";
                img.style.display = "block";
                img.src = src;
            }
        }

        /* --- OPEN SLIDESHOW FOR SPECIFIC EXAMPLE --- */
        function openGallery(type, index) {
            currentGallery = galleries[type];
            currentIndex = index;

            showMedia(currentGallery[currentIndex]);
            document.getElementById("overlay").classList.remove("hidden");
        }

        /* --- CLOSE SLIDESHOW --- */
        document.getElementById("closeOverlay").onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
            document.getElementById("overlayVideo").pause();
        };

        /* --- PREVIOUS IMAGE/VIDEO --- */
        document.getElementById("prevImg").onclick = () => {
            currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };

        /* --- NEXT IMAGE/VIDEO --- */
        document.getElementById("nextImg").onclick = () => {
            currentIndex = (currentIndex + 1) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };
    </script>

</body>
</html>
