<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Modelling - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>3D Modelling...</h1>
            <p class="tagline">Painted textures, built environments & stylised models</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- EXAMPLE CARDS (each opens its own slideshow) -->
        <div class="gallery">

            <div class="card" onclick="openGallery('prop', 0)">
                <img src="assets/StylisedProp1.jpg" alt="">
                <p>Stylised Prop</p>
                <p>£20 - £100</p>
            </div>

            <div class="card" onclick="openGallery('env', 0)">
                <img src="assets/Environment1.jpg" alt="">
                <p>Environment Model</p>
                <p>£150 - £250</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <!-- BOTH media types (we toggle them) -->
        <img id="overlayImage" class="overlay-image">
        <video id="overlayVideo" class="overlay-image" controls></video>

        <div class="nav-btn left" id="prevImg">⟵</div>
        <div class="nav-btn right" id="nextImg">⟶</div>
    </div>

    <script>
        /* -----------------------------------------
           SEPARATE IMAGE/VIDEO SETS FOR EACH EXAMPLE
        ------------------------------------------ */

        const galleries = {
            prop: [
                "assets/StylisedProp1.jpg",
                "assets/StylisedProp2.jpg",
                "assets/StylisedProp3.jpg",
                "assets/StylisedProp4.jpg",
                "assets/StylisedProp5.jpg",
                "assets/StylisedProp6.jpg",
                "assets/StylisedProp8.jpg",
                "assets/StylisedProp9.jpg",
                "assets/StylisedProp10.jpg",
                "assets/StylisedProp11.jpg",
                "assets/StylisedProp12.jpg"
            ],

            env: [
                "assets/Environment1.jpg",
                "assets/Environment2.jpg",
                "assets/Environment3.jpg",
                "assets/Environment4.webm",
                "assets/Environment5.jpg",
                "assets/Environment6.jpg"
            ]
        };

        let currentGallery = [];
        let currentIndex = 0;

        /* -----------------------------------------
           SHOW IMAGE OR VIDEO DEPENDING ON FILE TYPE
        ------------------------------------------ */
        function showMedia(src) {
            const img = document.getElementById("overlayImage");
            const vid = document.getElementById("overlayVideo");

            if (src.endsWith(".webm")) {
                img.style.display = "none";
                vid.style.display = "block";
                vid.src = src;
                vid.play();
            } else {
                vid.pause();
                vid.style.display = "none";
                img.style.display = "block";
                img.src = src;
            }
        }

        /* --- OPEN SLIDESHOW FOR SPECIFIC EXAMPLE --- */
        function openGallery(type, index) {
            currentGallery = galleries[type];
            currentIndex = index;

            showMedia(currentGallery[currentIndex]);
            document.getElementById("overlay").classList.remove("hidden");
        }

        /* --- CLOSE SLIDESHOW --- */
        document.getElementById("closeOverlay").onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
            document.getElementById("overlayVideo").pause();
        };

        /* --- PREVIOUS IMAGE/VIDEO --- */
        document.getElementById("prevImg").onclick = () => {
            currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };

        /* --- NEXT IMAGE/VIDEO --- */
        document.getElementById("nextImg").onclick = () => {
            currentIndex = (currentIndex + 1) % currentGallery.length;
            showMedia(currentGallery[currentIndex]);
        };
    </script>

</body>
</html>
