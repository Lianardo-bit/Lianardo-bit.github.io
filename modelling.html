<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Modelling - Lia's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">

        <header>
            <h1>3D Modelling...</h1>
            <p class="tagline">Props, simple chibi characters, environments & stylised models</p>
        </header>

        <a href="#" onclick="parent.loadPage('main.html')" class="back-link">← Back to Home</a>

        <section class="section">
            <h2>Examples:</h2>
        </section>

        <!-- CLICKABLE THUMBNAILS -->
        <div class="gallery">

            <div class="card" onclick="openGallery(0)">
                <img src="assets/model1.jpg" alt="">
                <p>Stylised Prop</p>
                <p>£20 - £50</p>
            </div>

            <div class="card" onclick="openGallery(1)">
                <img src="assets/model2.jpg" alt="">
                <p>Chibi Character</p>
                <p>£30 - £60</p>
            </div>

            <div class="card" onclick="openGallery(2)">
                <img src="assets/Environment1.png" alt="">
                <p>Environment Model</p>
                <p>£50 - £100</p>
            </div>

        </div>

    </div>

    <!-- OVERLAY SLIDESHOW -->
    <div id="overlay" class="overlay hidden">
        <span id="closeOverlay" class="close-btn">×</span>

        <img id="overlayImage" class="overlay-image">

        <div class="nav-btn left" id="prevImg">⟵</div>
        <div class="nav-btn right" id="nextImg">⟶</div>
    </div>

    <script>
        /* --- IMAGE LIST FOR THIS PAGE ONLY --- */
        let images = [
            "assets/model1.jpg",
            "assets/model2.jpg",
            "assets/Environment1.png"
        ];

        let currentIndex = 0;

        function openGallery(index) {
            currentIndex = index;
            document.getElementById("overlayImage").src = images[currentIndex];
            document.getElementById("overlay").classList.remove("hidden");
        }

        document.getElementById("closeOverlay").onclick = () => {
            document.getElementById("overlay").classList.add("hidden");
        };

        document.getElementById("prevImg").onclick = () => {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById("overlayImage").src = images[currentIndex];
        };

        document.getElementById("nextImg").onclick = () => {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById("overlayImage").src = images[currentIndex];
        };
    </script>

</body>
</html>
